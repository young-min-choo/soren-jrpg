<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soren — JRPG</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #game-container {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    canvas {
      display: block;
      outline: none;
      /* Scale the 256×224 canvas up to 3x via CSS */
      width: 768px;
      height: 672px;
      /* Use smooth scaling — text stays readable, sprites are slightly soft */
    }
  </style>
</head>
<body>
  <div id="game-container" tabindex="0"></div>
  <script type="module" src="/src/main.js"></script>
  <script>
    // Auto-focus the game container so keyboard input works immediately
    window.addEventListener('load', function() {
      var container = document.getElementById('game-container');
      if (container) container.focus();
    });
    // Refocus on any click
    document.addEventListener('click', function() {
      var container = document.getElementById('game-container');
      if (container) container.focus();
    });
  </script>
</body>
</html>
